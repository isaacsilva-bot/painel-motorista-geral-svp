<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP - Painel de Atendimento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg: #fff7ed;
            --text-main: #431407;
            --text-muted: #9a3412;
            --white: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0; 
            padding: 15px;
            color: var(--text-main);
        }

        .app-container { width: 100%; max-width: 450px; }

        /* AJUSTE DA LOGO: Ocupando a largura total para ficar maior */
        .logo-topo {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 12px;
        }

        /* Card de Aviso */
        .aviso-card {
            background: #ffedd5;
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(249, 115, 22, 0.1);
        }
        .aviso-card i { color: var(--primary); font-size: 22px; }
        .aviso-card p { margin: 0; font-size: 13px; font-weight: 600; line-height: 1.4; color: #7c2d12; }

        /* Card de Busca */
        .search-card { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border-top: 6px solid var(--primary);
        }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        input { 
            width: 100%; padding: 16px 16px 16px 45px; 
            border: 2px solid #fed7aa; border-radius: 14px; 
            box-sizing: border-box; font-size: 16px; font-weight: 600;
            outline: none;
        }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Lista de Resultados */
        .resultado-item { 
            background: white; padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; border-left: 6px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .info-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .info-row i { color: var(--primary); margin-top: 3px; width: 18px; text-align: center; }
        .label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .value { font-size: 14px; font-weight: 600; }
        
        .pacotes-badge { 
            background: #fff7ed; border: 1px dashed var(--primary);
            padding: 12px; border-radius: 12px; text-align: center; margin-top: 8px;
        }

        .error { color: #991b1b; text-align: center; display: none; background: #fee2e2; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .count-info { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <img src="img.png" alt="SVP Transportes" class="logo-topo">

    <div class="aviso-card">
        <i class="fas fa-exclamation-circle"></i>
        <p>Visite as lojas 1h antes do fechamento. Este painel é um apoio; siga sempre a orientação do seu <strong>analista</strong>.</p>
    </div>

    <div class="search-card">
        <h2 style="text-align: center; color: var(--primary); margin-top: 0;">Consulta de Rota</h2>
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" id="idInput" placeholder="DIGITE SEU ID" inputmode="numeric">
        </div>
        <button onclick="buscarDados()">CONSULTAR PONTOS</button>
    </div>

    <div id="error" class="error">Ops, não encontramos o ID informado. Pode verificar com seu analista se o fechamento do ponto já foi liberado? Se preferir, tente novamente em 40 minutos.</div>
    <div id="count" class="count-info"></div>
    <div id="listaResultados"></div>
</div>

<script>
    const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=950676577&single=true&output=csv";

    async function buscarDados() {
        const idBuscado = document.getElementById('idInput').value.trim();
        const listaDiv = document.getElementById('listaResultados');
        const erroDiv = document.getElementById('error');
        const countDiv = document.getElementById('count');

        if (!idBuscado) return;

        listaDiv.innerHTML = "";
        erroDiv.style.display = 'none';
        countDiv.innerText = "Buscando...";

        try {
            const response = await fetch(URL_PLANILHA);
            const data = await response.text();
            const linhas = data.split(/\r?\n/);
            let encontrados = [];

            for (let i = 1; i < linhas.length; i++) {
                const colunas = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const limpar = (t) => t ? t.replace(/^"|"$/g, '').trim() : "";

                if (limpar(colunas[1]) === idBuscado) {
                    encontrados.push({
                        func: limpar(colunas[0]),
                        visita: limpar(colunas[2]),
                        pacotes: limpar(colunas[3]),
                        end: limpar(colunas[4]),
                        loja: limpar(colunas[5])
                    });
                }
            }

            if (encontrados.length > 0) {
                countDiv.innerText = `${encontrados.length} ponto(s) encontrado(s)`;
                encontrados.forEach(item => {
                    listaDiv.innerHTML += `
                        <div class="resultado-item">
                            <div class="info-row"><i class="fas fa-store"></i><div><span class="label">Loja</span><br><span class="value">${item.loja}</span></div></div>
                            <div class="info-row"><i class="fas fa-map-marker-alt"></i><div><span class="label">Endereço</span><br><span class="value">${item.end}</span></div></div>
                            <div class="info-row"><i class="fas fa-clock"></i><div><span class="label">Funcionamento</span><br><span class="value">${item.func}</span></div></div>
                            <div class="info-row"><i class="fas fa-calendar-check"></i><div><span class="label">Sua Visita</span><br><span class="value">${item.visita}</span></div></div>
                            <div class="pacotes-badge">
                                <span class="label">Pacotes Coletados</span><br>
                                <span style="font-size:22px; font-weight:800; color:var(--primary);">${item.pacotes}</span>
                            </div>
                        </div>`;
                });
            } else {
                countDiv.innerText = "";
                erroDiv.style.display = 'block';
            }
        } catch (e) {
            alert("Erro ao carregar dados.");
        }
    }
</script>
</body>
</html>
