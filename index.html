<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP - Painel do Motorista</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            color: var(--text-main);
        }

        .app-card { 
            background: var(--white); 
            padding: 32px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%; 
            max-width: 400px; 
            transition: all 0.3s ease;
        }

        .brand { text-align: center; margin-bottom: 30px; }
        .brand .logo-icon { 
            background: var(--primary); 
            color: white; 
            width: 50px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 14px; 
            margin: 0 auto 12px;
            font-size: 24px;
        }
        .brand h2 { margin: 0; font-weight: 700; color: var(--text-main); font-size: 22px; }
        .brand p { margin: 5px 0 0; color: var(--text-muted); font-size: 14px; }

        .search-area { margin-bottom: 25px; }
        .input-group { position: relative; }
        .input-group i { 
            position: absolute; 
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--text-muted); 
        }

        input { 
            width: 100%; 
            padding: 16px 16px 16px 45px; 
            border: 2px solid #e2e8f0; 
            border-radius: 14px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.2s; 
            font-weight: 500;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 16px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: scale(0.98); }

        #resultado { display: none; margin-top: 30px; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .data-grid { display: grid; gap: 12px; }
        .info-card { 
            background: #f1f5f9; 
            padding: 16px; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column;
            gap: 4px;
        }
        .info-card i { color: var(--primary); font-size: 14px; margin-bottom: 4px; }
        .label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 15px; color: var(--text-main); font-weight: 600; }
        
        .destaque-card { background: #eff6ff; border: 1px solid #dbeafe; }
        .destaque-card .value { color: var(--primary); font-size: 24px; }

        .error { color: #dc2626; text-align: center; display: none; margin-top: 20px; font-size: 14px; background: #fee2e2; padding: 12px; border-radius: 10px; }
        
        footer { margin-top: 20px; text-align: center; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand">
        <div class="logo-icon"><i class="fas fa-truck-fast"></i></div>
        <h2>SVP Transportes</h2>
        <p>Portal de Desempenho do Motorista</p>
    </div>

    <div class="search-area">
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" id="idInput" placeholder="Informe seu ID Pessoal" inputmode="numeric">
        </div>
        <button onclick="buscarDados()" style="margin-top: 15px;">
            <i class="fas fa-magnifying-glass"></i> PESQUISAR
        </button>
    </div>

    <div id="error" class="error">
        <i class="fas fa-circle-exclamation"></i> ID não localizado na base de dados.
    </div>

    <div id="resultado">
        <div class="data-grid">
            <div class="info-card">
                <i class="fas fa-store"></i>
                <span class="label">Loja</span>
                <span id="resLoja" class="value"></span>
            </div>
            <div class="info-card">
                <i class="fas fa-location-dot"></i>
                <span class="label">Endereço</span>
                <span id="resEndereco" class="value"></span>
            </div>
            <div class="info-card">
                <i class="fas fa-clock"></i>
                <span class="label">Funcionamento</span>
                <span id="resFuncionamento" class="value"></span>
            </div>
            <div class="info-card">
                <i class="fas fa-user-clock"></i>
                <span class="label">Sua Visita</span>
                <span id="resVisita" class="value"></span>
            </div>
            <div class="info-card destaque-card">
                <i class="fas fa-box-open"></i>
                <span class="label">Pacotes Coletados</span>
                <span id="resPacotes" class="value"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=950676577&single=true&output=csv";

    async function buscarDados() {
        const idBuscado = document.getElementById('idInput').value.trim();
        const resDiv = document.getElementById('resultado');
        const erroDiv = document.getElementById('error');

        if (!idBuscado) return;

        try {
            const response = await fetch(URL_PLANILHA);
            const data = await response.text();
            const linhas = data.split(/\r?\n/);
            let encontrado = null;

            for (let i = 1; i < linhas.length; i++) {
                const colunas = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const limpar = (t) => t ? t.replace(/^"|"$/g, '').trim() : "";

                if (limpar(colunas[1]) === idBuscado) {
                    encontrado = {
                        func: limpar(colunas[0]),
                        visita: limpar(colunas[2]),
                        pacotes: limpar(colunas[3]),
                        end: limpar(colunas[4]),
                        loja: limpar(colunas[5])
                    };
                    break;
                }
            }

            if (encontrado) {
                document.getElementById('resLoja').innerText = encontrado.loja;
                document.getElementById('resEndereco').innerText = encontrado.end;
                document.getElementById('resFuncionamento').innerText = encontrado.func;
                document.getElementById('resVisita').innerText = encontrado.visita;
                document.getElementById('resPacotes').innerText = encontrado.pacotes;

                resDiv.style.display = 'block';
                erroDiv.style.display = 'none';
            } else {
                resDiv.style.display = 'none';
                erroDiv.style.display = 'block';
            }
        } catch (e) {
            alert("Erro de conexão.");
        }
    }
</script>

</body>
</html>
