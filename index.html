<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP - Painel de Visitas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg: #fff7ed;
            --text-main: #431407;
            --text-muted: #9a3412;
            --white: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            color: var(--text-main);
        }

        .app-container { width: 100%; max-width: 450px; }

        /* Estilo do novo card de aviso */
        .aviso-card {
            background: #ffedd5;
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(249, 115, 22, 0.1);
        }
        .aviso-card i { color: var(--primary); font-size: 20px; }
        .aviso-card p { margin: 0; font-size: 13px; font-weight: 600; line-height: 1.4; color: #7c2d12; }

        .search-card { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border-top: 6px solid var(--primary);
        }

        .brand { text-align: center; margin-bottom: 20px; }
        .brand h2 { margin: 0; font-weight: 800; font-size: 22px; color: var(--primary); }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        input { 
            width: 100%; padding: 16px 16px 16px 45px; 
            border: 2px solid #fed7aa; border-radius: 14px; 
            box-sizing: border-box; font-size: 16px; font-weight: 600;
        }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }

        button:hover { background: var(--primary-dark); }

        .resultado-item { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease-out;
