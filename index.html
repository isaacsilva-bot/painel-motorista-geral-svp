<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP - Painel de Atendimento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg: #fff7ed;
            --text-main: #431407;
            --text-muted: #9a3412;
            --white: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0; 
            padding: 15px;
            color: var(--text-main);
        }

        .app-container { width: 100%; max-width: 450px; }

        /* AJUSTE NA LOGO: Aumentando o tamanho */
        .logo-topo {
            width: 100%; /* Ocupa a largura total do container */
            max-width: 300px; /* Limite de largura para não ficar gigante em telas grandes */
            height: auto; /* Mantém a proporção original */
            margin: 0 auto 20px auto; /* Centraliza e dá espaço abaixo */
            display: block;
        }

        .aviso-card {
            background: #ffedd5;
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(249, 115, 22, 0.1);
        }
        .aviso-card i { color: var(--primary); font-size: 22px; }
        .aviso-card p { margin: 0; font-size: 13px; font-weight: 600; line-height: 1.4; color: #7c2d12; }
        .aviso-card strong { color: var(--primary-dark); }

        .search-card { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border-top: 6px solid var(--primary);
        }

        .brand { text-align: center; margin-bottom: 20px; }
        .brand h2 { margin: 0; font-weight: 800; font-size: 20px; color: var(--primary); line-height: 1.2; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        input { 
            width: 100%; padding: 16px 16px 16px 45px; 
            border: 2px solid #fed7aa; border-radius: 14px; 
            box-sizing: border-box; font-size: 16px; font-weight: 600;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        button:hover { background: var(--primary-dark); }

        .resultado-item { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease-out;
            border-left: 6px solid var(--primary);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .info-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .info-row i { color: var(--primary); margin-top: 3px; width: 18px; text-align: center; }
        .info-content { display: flex; flex-direction: column; }
        .label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 14px; font-weight: 600; line-height: 1.3; }
        
        .pacotes-badge { 
            background: #fff7ed; border: 1px dashed var(--primary);
            padding: 12px; border-radius: 12px; text-align: center; margin-top: 8px;
        }
        .pacotes-badge .value { font-size: 24px; color: var(--primary); font-weight: 800; }

        .error { color: #991b1b; text-align: center; display: none; background: #fee2e2; padding: 15px; border-radius: 12px; font-weight: 600; }
        .count-info { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app-container">
    <img src="img.png" alt="Logo SVP" class="logo-topo">

    <div class="aviso-card">
        <i class="fas fa-exclamation-circle"></i>
        <p>
            Visite as lojas 1h antes do fechamento. Este painel é um apoio; siga sempre a orientação do seu <strong>analista</strong>.
        </p>
    </div>

    <div class="search-card">
        <div class="brand">
            <h2>Atendimento a Pontos de Coleta</h2>
            <p style="font-size: 11px; margin: 5px 0 0; color: var(--text-muted);">Painel DOP - Multi-Visitas</p>
        </div>
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" id="idInput" placeholder="DIGITE SEU ID" inputmode="numeric">
        </div>
        <button onclick="buscarDados()">CONSULTAR PONTOS</button>
    </div>

    <div id="error" class="error">Nenhum dado encontrado para este ID.</div>
    <div id="count" class="count-info"></div>
    <div id="listaResultados"></div>
</div>

<script>
    const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=950676577&single=true&output=csv";

    async function buscarDados() {
        const idBuscado = document.getElementById('idInput').value.trim();
        const listaDiv = document.getElementById('listaResultados');
        const erroDiv = document.getElementById('error');
        const countDiv = document.getElementById('count');

        if (!idBuscado) return;

        listaDiv.innerHTML = "";
        erroDiv.style.display = 'none';
        countDiv.innerText = "Buscando informações...";

        try {
            const response = await fetch(URL_PLANILHA);
            const data = await response.text();
            const linhas = data.split(/\r?\n/);
            
            let encontrados = [];

            for (let i = 1; i < linhas.length; i++) {
                const colunas = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const limpar = (t) => t ? t.replace(/^"|"$/g, '').trim() : "";

                if (limpar(colunas[1]) === idBuscado) {
                    encontrados.push({
                        func: limpar(colunas[0]),
                        visita: limpar(colunas[2]),
                        pacotes: limpar(colunas[3]),
                        end: limpar(colunas[4]),
                        loja: limpar(colunas[5])
                    });
                }
            }

            if (encontrados.length > 0) {
                countDiv.innerText = `${encontrados.length} ponto(s) de coleta encontrado(s)`;
                
                encontrados.forEach(item => {
                    const card = `
                        <div class="resultado-item">
                            <div class="info-row">
                                <i class="fas fa-store"></i>
                                <div class="info-content">
                                    <span class="label">Loja</span>
                                    <span class="value">${item.loja}</span>
                                </div>
                            </div>
                            <div class="info-row">
                                <i class="fas fa-map-marker-alt"></i>
                                <div class="info-content">
                                    <span class="label">Endereço</span>
                                    <span class="value">${item.end}</span>
                                </div>
                            </div>
                            <div class="info-row">
                                <i class="fas fa-clock"></i>
                                <div class="info-content">
                                    <span class="label">Horário Funcionamento</span>
                                    <span class="value">${item.func}</span>
                                </div>
                            </div>
                            <div class="info-row">
                                <i class="fas fa-calendar-check"></i>
                                <div class="info-content">
                                    <span class="label">Sua Visita</span>
                                    <span class="value">${item.visita}</span>
                                </div>
                            </div>
                            <div class="pacotes-badge">
                                <span class="label">Pacotes Coletados</span>
                                <div class="value">${item.pacotes}</div>
                            </div>
                        </div>
                    `;
                    listaDiv.innerHTML += card;
                });
            } else {
                countDiv.innerText = "";
                erroDiv.style.display = 'block';
            }
        } catch (e) {
            countDiv.innerText = "";
            alert("Erro ao carregar dados. Verifique sua conexão.");
        }
    }
</script>
</body>
</html>
